<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithm Benchmarks</title>
    <script
      src="https://cdn.jsdelivr.net/npm/plotly.js@3.1.0/dist/plotly.min.js"
      integrity="sha256-Ei4740bWZhaUTQuD6q9yQlgVCMPBz6CZWhevDYPv93A="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.js"
      integrity="sha256-fN8vcX2ULyTDspVTHEteK8hd3rQAb5thNiwakjAW75Q="
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css"
      integrity="sha256-cDGQ39yChhpN5vzgHbjIdGEtQ5kXE9tttCsI7VR9TuY="
      crossorigin="anonymous"
    />
    <style>
      .ui.container {
        padding: 2em;
        padding-top: 4em;
      }
      #tree {
        max-width: 600px;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 1em;
      }
      #tree .ui.accordion {
        margin: 0;
      }
      #tree .ui.accordion > .content {
        padding: 0 1.5em;
      }
      #tree .scenario-checkbox {
        display: block !important;
        margin: 0.5em;
      }
      #plot {
        width: 100%;
        min-height: 400px;
      }
      @media (max-width: 1000px) {
        .ui.container {
          width: 100%;
        }
      }
      @media (max-width: 600px) {
        #tree {
          max-width: 100%;
        }
        #plot {
          min-height: 300px;
        }
      }
      .ui.styled.accordion {
        width: initial;
      }
    </style>
  </head>
  <body>
    <div class="ui container">
      <div class="ui grid" style="margin-bottom: 1em">
        <div class="eight wide column">
          <h2 class="ui header">Algorithm Benchmarks</h2>
        </div>
        <div class="eight wide column" style="text-align: right">
          <a href="https://github.com/Zzzzzzyt/algo-benchmarks" class="ui button" target="_blank">
            <i class="github icon"></i>View on GitHub
          </a>
        </div>
      </div>

      <!-- profile and Results Selection -->
      <div class="ui form" style="margin-bottom: 2em">
        <div class="field">
          <label for="profileDropdown">Select profile</label>
          <div class="ui selection dropdown" id="profileDropdown">
            <input type="hidden" name="profile" />
            <i class="dropdown icon"></i>
            <div class="default text">Loading profiles...</div>
            <div class="menu" id="profileMenu"></div>
          </div>
        </div>
      </div>
      <div id="profileInfo" style="margin-bottom: 2em; display: none">
        <div class="ui styled accordion">
          <div class="title">
            <i class="dropdown icon"></i>
            Profile Information
          </div>
          <div class="content">
            <div id="profileDetails"></div>
          </div>
        </div>
      </div>

      <div class="ui grid stackable">
        <div class="four wide column">
          <div class="field" style="margin-bottom: 1em">
            <label for="metricSelect">Metric</label>
            <select id="metricSelect" class="ui fluid dropdown" onchange="refresh()">
              <option value="time_ns">Time (ns)</option>
              <option value="constant">Constant</option>
              <option value="cpu_cycles">CPU cycles</option>
              <option value="instructions">Instructions</option>
              <option value="ipc">IPC</option>
              <option value="branches">Branches</option>
              <option value="branch_misses">Branch misses</option>
              <option value="branch_miss_rate">Branch miss rate</option>
              <option value="cache_references">Cache references</option>
              <option value="cache_misses">Cache misses</option>
              <option value="cache_miss_rate">Cache miss rate</option>
              <option value="l1_dcache_loads">L1d Cache loads</option>
              <option value="l1_dcache_load_misses">L1d Cache load misses</option>
              <option value="l1_dcache_miss_rate">L1d Cache miss rate</option>
            </select>
          </div>
          <div class="ui toggle checkbox" style="margin-bottom: 1em">
            <input type="checkbox" id="linesToggle" onchange="refresh()" />
            <label for="linesToggle">Show lines</label>
          </div>
          <div class="ui toggle checkbox" style="margin-bottom: 1em">
            <input type="checkbox" id="minmaxToggle" onchange="refresh()" checked />
            <label for="minmaxToggle">Show min/max</label>
          </div>
          <div id="tree" class="ui fluid"></div>
        </div>
        <div class="twelve wide column">
          <div id="plot"></div>
          <div id="details" class="ui segment" style="display: none"></div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
